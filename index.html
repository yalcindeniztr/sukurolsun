<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yalçın Deniz - Geliştirici Sayfası</title>
    <meta http-equiv="refresh" content="3;url=https://yalcindeniztr.github.io/sukurolsun/">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0fdf4;
            color: #1e293b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            max-width: 400px;
        }
        h1 {
            color: #10b981;
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            color: #64748b;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #10b981;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 1.5rem auto 0 auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Yalçın Deniz</h1>
        <p>Şükür Olsun uygulaması sayfasına yönlendiriliyorsunuz...</p>
        <p><a href="https://yalcindeniztr.github.io/sukurolsun/" style="color: #10b981; text-decoration: none; font-weight: 500;">Gitmek için buraya tıklayın</a></p>
        <div class="loader"></div>
    </div>
</body>
</html>
